<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relax Café - Menú Digital y Físico</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    // Evitar conflictos con Node/Electron
    window.tempModule = window.module;
    window.module = undefined;
  </script>
  <script src="lucide.min.js"></script>
  <script>
    window.module = window.tempModule;
    delete window.tempModule;
  </script>
  <style>
    :root {
      --bg-beige: #FAF6F0;
      --card-bg: #FFFFFF;
      --text-dark: #362820;
      --text-muted: #7E6B5F;
      --accent-brown: #5C4A3F;
      --accent-yellow: #D4A373;
      --accent-yellow-light: #F4EAD4;
      --border-color: #E6DFD5;
      --shadow: 0 4px 15px rgba(86, 68, 56, 0.04);
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }
    body {
      background-color: var(--bg-beige);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* BARRA DE HERRAMIENTAS (PANTALLA) */
    .control-bar {
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 0.8rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ccc;
    }
    .status-dot.connected {
      background-color: #2A9D8F;
      box-shadow: 0 0 8px #2A9D8F;
    }
    .status-dot.error {
      background-color: #D9534F;
      box-shadow: 0 0 8px #D9534F;
    }
    .btn-print {
      background-color: var(--accent-brown);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }
    .btn-print:hover {
      background-color: var(--accent-yellow);
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(212, 163, 115, 0.2);
    }
    /* ENCABEZADO DEL MENÚ */
    .menu-header {
      text-align: center;
      margin: 2.5rem auto 1.5rem auto;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .menu-logo {
      height: 120px;
      width: 120px;
      object-fit: cover;
      border-radius: 24px;
      border: 3px solid white;
      box-shadow: 0 8px 24px rgba(86, 68, 56, 0.1);
      margin-bottom: 1.2rem;
      transition: transform 0.3s ease;
    }
    .menu-logo:hover {
      transform: scale(1.05);
    }
    .menu-brand-title {
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--accent-brown);
      letter-spacing: 1px;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
    }
    .menu-subtitle {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent-yellow);
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 1rem;
    }
    .menu-divider {
      width: 60px;
      height: 3px;
      background-color: var(--accent-yellow);
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }
    /* CONTENEDOR DE CATEGORÍAS */
    .menu-content {
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 0 2rem 4rem 2rem;
    }
    /* DISEÑO DE GRID DE TARJETAS EN PANTALLA */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 2rem;
    }
    .category-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 1.8rem;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }
    .category-card:hover {
      transform: translateY(-4px);
      border-color: rgba(212, 163, 115, 0.4);
      box-shadow: 0 10px 25px rgba(86, 68, 56, 0.07);
    }
    .category-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--accent-brown);
      border-bottom: 2px solid var(--bg-beige);
      padding-bottom: 0.6rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .category-title i {
      color: var(--accent-yellow);
    }
    /* FILA DE PRODUCTO EN PANTALLA */
    .product-item {
      margin-bottom: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .product-item:last-child {
      margin-bottom: 0;
    }
    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
    }
    .product-name {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-dark);
    }
    .product-price {
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent-brown);
      white-space: nowrap;
    }
    .product-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
    }
    /* DISEÑO FÍSICO INVISIBLE EN PANTALLA */
    #printLayout {
      display: none;
    }
    /* ESTILOS DE IMPRESIÓN (DASHBOARD A MENÚ FÍSICO) */
    @media print {
      /* Resetear elementos web */
      .no-print, .control-bar {
        display: none !important;
      }
      body {
        background-color: #FFFFFF !important;
        color: #000000 !important;
        padding: 0 !important;
        margin: 0 !important;
        min-height: auto;
      }
      .menu-header {
        margin-top: 0 !important;
        margin-bottom: 2rem !important;
        page-break-inside: avoid;
      }
      .menu-logo {
        height: 90px !important;
        width: 90px !important;
        border-radius: 12px !important;
        border: 1px solid #000 !important;
        box-shadow: none !important;
      }
      .menu-brand-title {
        font-size: 1.8rem !important;
        color: #000 !important;
      }
      .menu-subtitle {
        font-size: 0.8rem !important;
        color: #000 !important;
      }
      .menu-divider {
        background-color: #000 !important;
      }
      /* Mostrar estructura de impresión exclusiva */
      .menu-content {
        display: none !important; /* Ocultar grid de pantalla */
      }
      #printLayout {
        display: block !important;
        width: 100%;
        padding: 0 10mm;
      }
      /* Dos columnas para menú físico */
      .print-columns {
        column-count: 2;
        column-gap: 1.8in;
        width: 100%;
      }
      .print-category-section {
        break-inside: avoid;
        margin-bottom: 2.2rem;
      }
      .print-category-title {
        font-size: 1.1rem;
        font-weight: 800;
        text-transform: uppercase;
        border-bottom: 2px solid #000;
        padding-bottom: 0.35rem;
        margin-bottom: 0.85rem;
        letter-spacing: 1px;
      }
      .print-item {
        margin-bottom: 0.85rem;
        break-inside: avoid;
      }
      /* LÍNEAS DE GUÍA DE PUNTOS (LEADERS) PARA MENÚ FÍSICO */
      .print-item-header {
        display: flex;
        align-items: baseline;
        width: 100%;
      }
      .print-item-name {
        font-weight: bold;
        font-size: 0.95rem;
        white-space: nowrap;
      }
      .print-item-leader {
        flex-grow: 1;
        border-bottom: 1.5px dotted #000;
        margin: 0 8px;
      }
      .print-item-price {
        font-weight: bold;
        font-size: 0.95rem;
        white-space: nowrap;
      }
      .print-item-desc {
        font-size: 0.75rem;
        color: #333;
        line-height: 1.3;
        margin-top: 0.15rem;
      }
    }
  </style>
</head>
<body>
  <!-- BARRA DE CONTROL SUPERIOR (SOLO EN PANTALLA) -->
  <div class="control-bar no-print">
    <div class="status-indicator">
      <div id="statusDot" class="status-dot"></div>
      <span id="statusText">Conectando...</span>
    </div>
    
    <button id="btnPrint" class="btn-print">
      <i data-lucide="printer"></i>
      Imprimir Menú (Físico)
    </button>
  </div>
  <!-- ENCABEZADO -->
  <div class="menu-header">
    <img src="687823351_122100293793299542_3002419083930621851_n.jpg" alt="Relax Café Logo" class="menu-logo" onerror="this.src='https://via.placeholder.com/150/4A3B32/FFFFFF?text=Relax+Caf%C3%A9'">
    <h2 class="menu-brand-title">Relax Café</h2>
    <div class="menu-subtitle">Menú de Especialidad</div>
    <div class="menu-divider"></div>
  </div>
  <!-- CONTENEDOR DIGITAL (GRID DE TARJETAS EN PANTALLA) -->
  <main class="menu-content">
    <div id="categoriesGrid" class="categories-grid">
      <!-- Carga dinámica por javascript -->
    </div>
  </main>
  <!-- CONTENEDOR FÍSICO IMPRIMIBLE EXCLUSIVO (DOS COLUMNAS CON GUÍAS DE PUNTOS) -->
  <div id="printLayout">
    <div id="printColumns" class="print-columns">
      <!-- Carga dinámica optimizada para papel -->
    </div>
  </div>
  <!-- CONFIGURACIÓN DE FIREBASE Y LÓGICA -->
  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    // Cargar iconos de Lucide
    lucide.createIcons();
    // Elementos DOM
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const btnPrint = document.getElementById('btnPrint');
    const categoriesGrid = document.getElementById('categoriesGrid');
    const printColumns = document.getElementById('printColumns');
    // Mapeo de iconos para cada categoría
    const categoryIcons = {
      "DESAYUNO": "coffee",
      "ALMUERZO": "utensils",
      "CENA": "soup",
      "COMIDA DE TEMPORADA": "leaf",
      "BEBIDAS CALIENTES": "cup-straw",
      "BEBIDAS FRÍAS": "glass-water",
      "BEBIDAS DE TEMPORADA": "sparkles",
      "POSTRES": "cake",
      "REFACCIONES": "cookie",
      "HELADOS": "ice-cream",
      "HELADOS DE TEMPORADA": "sun"
    };
    // Lista ordenada estricta de las 11 categorías
    const orderedCategories = [
      "DESAYUNO",
      "ALMUERZO",
      "CENA",
      "COMIDA DE TEMPORADA",
      "BEBIDAS CALIENTES",
      "BEBIDAS FRÍAS",
      "BEBIDAS DE TEMPORADA",
      "POSTRES",
      "REFACCIONES",
      "HELADOS",
      "HELADOS DE TEMPORADA"
    ];
    let db;
    let menuItems = [];
    // Cambiar estado de conexión
    function setConnectionState(state, message) {
      statusText.textContent = message;
      if (state === 'connected') {
        statusDot.className = 'status-dot connected';
      } else if (state === 'error') {
        statusDot.className = 'status-dot error';
      } else {
        statusDot.className = 'status-dot';
      }
    }
    // Inicializar Firebase
    try {
      const config = window.CLOUD_CONFIG;
      if (!config || !config.firebase) {
        throw new Error("No se encontró la configuración.");
      }
      const app = initializeApp(config.firebase);
      db = getFirestore(app);
      const auth = getAuth(app);
      signInAnonymously(auth)
        .then(() => {
          setConnectionState('connected', 'Conectado a la Nube');
          startMenuListener();
        })
        .catch(err => {
          setConnectionState('error', 'Error de Conexión: ' + err.message);
        });
    } catch (err) {
      setConnectionState('error', 'Error de Configuración');
    }
    // Escuchar actualizaciones
    function startMenuListener() {
      onSnapshot(collection(db, "restaurant_web_menu"), (snapshot) => {
        menuItems = [];
        snapshot.forEach(doc => {
          menuItems.push({ id: doc.id, ...doc.data() });
        });
        renderMenu();
      }, (error) => {
        setConnectionState('error', 'Error al leer datos');
      });
    }
    // Renderizar menú
    function renderMenu() {
      categoriesGrid.innerHTML = '';
      printColumns.innerHTML = '';
      orderedCategories.forEach(categoryName => {
        // Filtrar productos de esta categoría
        const categoryItems = menuItems.filter(item => item.category === categoryName);
        if (categoryItems.length === 0) return; // Ocultar categorías vacías
        // Ordenar alfabéticamente
        categoryItems.sort((a, b) => a.name.localeCompare(b.name));
        // 1. RENDERIZAR EN PANTALLA (HTML Digital)
        const iconName = categoryIcons[categoryName] || 'menu';
        const card = document.createElement('div');
        card.className = 'category-card';
        
        let productsHtml = '';
        categoryItems.forEach(item => {
          productsHtml += `
            <div class="product-item">
              <div class="product-header">
                <span class="product-name">${escapeHtml(item.name)}</span>
                <span class="product-price">Q${parseFloat(item.price).toFixed(2)}</span>
              </div>
              ${item.details ? `<span class="product-desc">${escapeHtml(item.details)}</span>` : ''}
            </div>
          `;
        });
        card.innerHTML = `
          <h3 class="category-title">
            <i data-lucide="${iconName}"></i>
            ${escapeHtml(categoryName)}
          </h3>
          <div class="products-list">
            ${productsHtml}
          </div>
        `;
        categoriesGrid.appendChild(card);
        // 2. RENDERIZAR PARA IMPRESIÓN (Menú Físico)
        const printSection = document.createElement('div');
        printSection.className = 'print-category-section';
        let printProductsHtml = '';
        categoryItems.forEach(item => {
          printProductsHtml += `
            <div class="print-item">
              <div class="print-item-header">
                <span class="print-item-name">${escapeHtml(item.name)}</span>
                <span class="print-item-leader"></span>
                <span class="print-item-price">Q${parseFloat(item.price).toFixed(2)}</span>
              </div>
              ${item.details ? `<p class="print-item-desc">${escapeHtml(item.details)}</p>` : ''}
            </div>
          `;
        });
        printSection.innerHTML = `
          <h4 class="print-category-title">${escapeHtml(categoryName)}</h4>
          <div class="print-items-list">
            ${printProductsHtml}
          </div>
        `;
        printColumns.appendChild(printSection);
      });
      lucide.createIcons();
    }
    // Evento de impresión
    btnPrint.addEventListener('click', () => {
      window.print();
    });
    // Helper para escapar HTML
    function escapeHtml(text) {
      if (!text) return '';
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, function(m) { return map[m]; });
    }
  </script>
</body>
</html>
